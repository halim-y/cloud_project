services:
  dashboard:
    build: ./dashboard
    ports:
      - "8501:8080"
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json
      - FLASK_URL=http://backend:8080
      - PASSWORD_HASH=${PASSWORD_HASH}
    volumes:
      - ./gcp-key.json:/tmp/gcp-key.json

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - CITY=${CITY:-Genève}
      - PASSWORD_HASH=${PASSWORD_HASH}
    volumes:
      - ./gcp-key.json:/tmp/gcp-key.json
